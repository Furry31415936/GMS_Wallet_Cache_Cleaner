<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Wallet Cache Cleaner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            background: #121212;
            color: #eee;
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            color: #4fc3f7;
            font-size: 22px;
            text-align: center;
            margin-bottom: 4px;
        }
        .version {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .time { text-align: center; color: #888; font-size: 13px; margin-bottom: 16px; }
        
        .info-card {
            background: #1e3a5f;
            border: 1px solid #1565c0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .info-card strong { color: #4fc3f7; }
        
        .section-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            margin-top: 16px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-weight: 500;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-safe { background: #2e7d32; color: white; }
        .btn-refresh { background: #f57f17; color: white; }
        .btn-experimental { background: #c62828; color: white; }
        .btn-blue { background: #1565c0; color: white; }
        .btn-gray { background: #424242; color: white; }
        .btn-purple { background: #6a1b9a; color: white; }
        
        .btn-sm { padding: 8px 14px; font-size: 12px; }
        
        .level-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .level-safe { background: #2e7d3244; color: #81c784; border: 1px solid #2e7d32; }
        .level-refresh { background: #f57f1744; color: #ffb74d; border: 1px solid #f57f17; }
        .level-experimental { background: #c6282844; color: #e57373; border: 1px solid #c62828; }
        
        .log-container {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
        }
        .log-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        #log {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #ccc;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #log .success { color: #81c784; }
        #log .error { color: #e57373; }
        #log .info { color: #64b5f6; }
        #log .warn { color: #ffb74d; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
        
        .mode-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1e1e1e;
            color: #888;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .mode-btn.active { 
            border-color: #4fc3f7;
            color: #4fc3f7;
            background: #1e3a5f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 GMS Wallet Cache Cleaner</h1>
        <p class="version">v1.2 — 分层清理系统</p>
        <p class="subtitle">不退出账号 · 不解除手表配对 · 仅刷新风险状态</p>
        <p class="time">🕐 <span id="time"></span></p>
        
        <div class="info-card">
            <strong>💡 选择清理级别</strong><br>
            <span class="level-badge level-safe">🟢 Safe</span> 仅清缓存 — 不影响任何功能<br>
            <span class="level-badge level-refresh">🟡 Refresh</span> 清缓存 + 刷新进程 — 推荐<br>
            <span class="level-badge level-experimental">🔴 Experimental</span> 探索清理 — 高风险<br>
            <br>
            <strong>⚠️ 操作顺序建议:</strong><br>
            ① 先 <strong>snapshot</strong> 记录状态<br>
            ② 用 <strong>Safe</strong> 或 <strong>Refresh</strong><br>
            ③ 重启设备<br>
            ④ 再次 <strong>snapshot</strong> → <strong>diff</strong> 发现变化
        </div>
        
        <div class="section-title">🧹 清理操作</div>
        <div class="btn-group">
            <button class="btn btn-safe" onclick="execCmd('safe')" id="btnSafe">
                🟢 Safe 安全模式 — 仅清缓存
            </button>
            <button class="btn btn-refresh" onclick="execCmd('refresh')" id="btnRefresh">
                🟡 Refresh 刷新模式 — 推荐
            </button>
            <button class="btn btn-experimental" onclick="execCmd('experimental')" id="btnExperimental">
                🔴 Experimental 探索模式 — 慎用
            </button>
        </div>
        
        <div class="section-title">📦 辅助功能</div>
        <div class="btn-group">
            <button class="btn btn-blue" onclick="execCmd('backup')" id="btnBackup">📦 全量备份</button>
            <button class="btn btn-purple" onclick="execCmd('snapshot')" id="btnSnapshot">📸 文件状态快照</button>
            <button class="btn btn-purple" onclick="execCmd('diff')" id="btnDiff">📊 对比两次快照</button>
            <button class="btn btn-gray" onclick="execCmd('list')" id="btnList">📋 查看备份和快照</button>
            <button class="btn btn-gray" onclick="execCmd('reboot')" id="btnReboot">🔁 重启设备</button>
        </div>
        
        <div class="log-container">
            <div class="log-title">📝 操作日志</div>
            <pre id="log">[系统就绪] v1.2 分层清理系统已加载</pre>
            <div class="status-bar">
                <span id="logCount">0 条</span>
                <span onclick="clearLog()" style="cursor:pointer;color:#1565c0;">清除日志</span>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
